<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BL Auditor - Dashboard</title>
  <meta name="description" content="BuyLead Product Auditor - AI-powered categorization and quality analysis dashboard." />
  <link rel="stylesheet" href="/static/css/style.css?v=light-2" />
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <div class="navbar-logo">BL</div>
      <div>
        <div class="navbar-title">BL Auditor</div>
        <div class="navbar-subtitle">Multiagent Product Auditor</div>
      </div>
    </a>
    <div class="navbar-actions">
      <span class="badge-live">Live</span>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Running AI Auditor Pipeline...</div>
    <div style="color:var(--text-muted);font-size:0.78rem;margin-top:6px;">This may take 15-30 seconds</div>
  </div>

  <script src="/static/js/app.js?v=light-2"></script>
</body>
</html>
